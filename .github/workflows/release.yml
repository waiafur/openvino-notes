name: Release

on:
  workflow_call:

env:
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  JAVA_VERSION: "17"

jobs:
  release-assemble:
    name: Release Assemble
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Assemble release variants
        shell: bash
        run: bash .github/scripts/release/assemble_release.sh

      - name: Upload release build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-build-reports
          if-no-files-found: ignore
          path: |
            **/build/outputs/apk/release/**
            **/build/outputs/bundle/release/**

  release-lint:
    name: Release Lint
    needs: release-assemble
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up toolchain
        uses: ./.github/actions/setup-android-gradle
        with:
          java-version: ${{ env.JAVA_VERSION }}
          android-api-level: ${{ env.ANDROID_API_LEVEL }}
          android-build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Lint release variants
        shell: bash
        run: bash .github/scripts/release/lint_release.sh

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-lint-reports
          if-no-files-found: ignore
          path: |
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml
